version: 2.1

jobs:
  deploy:
    docker:
      - image: hashicorp/terraform:latest
    environment:
      AWS_DEFAULT_REGION: "us-east-1"
    steps:
      - checkout
      - run:
          name: Install git
          command: apk add --no-cache git
      - run:
          name: Configure AWS credentials
          command: |
            mkdir -p ~/.aws
            printf "[default]\naws_access_key_id=%s\naws_secret_access_key=%s\naws_session_token=%s\n" \
              "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" "$AWS_SESSION_TOKEN" > ~/.aws/credentials
      - run:
          name: Terraform Init
          command: |
            cd Terraform
            terraform init
      - run:
          name: Terraform Plan
          command: |
            cd Terraform
            terraform plan
      - run:
          name: Terraform Apply
          command: |
            cd Terraform
            terraform apply --auto-approve
      - run:
          name: Update API URL and save state
          command: |
            API_URL=$(cd Terraform && terraform output -raw api_endpoint)
            echo "New API URL: $API_URL"
            sed -i "s|https://[a-z0-9]*.execute-api.us-east-1.amazonaws.com|${API_URL}|g" Frontend/js/app.js
            git config user.email "ci@terraflow.com"
            git config user.name "TerraFlow CI"
            git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/Jutinut-BBBOMB/CS365-DevOpsPipeline-Serverless.git
            git checkout main
            git add Frontend/js/app.js Terraform/terraform.tfstate
            git diff --cached --quiet && echo "No changes" || \
              (git commit -m "auto: update API URL and save terraform state" && \
               git push origin main)

  destroy:
    docker:
      - image: hashicorp/terraform:latest
    environment:
      AWS_DEFAULT_REGION: "us-east-1"
    steps:
      - checkout
      - run:
          name: Configure AWS credentials
          command: |
            mkdir -p ~/.aws
            printf "[default]\naws_access_key_id=%s\naws_secret_access_key=%s\naws_session_token=%s\n" \
              "$AWS_ACCESS_KEY_ID" "$AWS_SECRET_ACCESS_KEY" "$AWS_SESSION_TOKEN" > ~/.aws/credentials
      - run:
          name: Terraform Init
          command: |
            cd Terraform
            terraform init
      - run:
          name: Terraform Destroy
          command: |
            cd Terraform
            terraform destroy --auto-approve

workflows:
  deploy-infrastructure:
    jobs:
      - deploy:
          filters:
            branches:
              only: main

  destroy-infrastructure:
    jobs:
      - destroy:
          filters:
            branches:
              only: destroy
